    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .gradient-text {
            background: linear-gradient(135deg, #059669 0%, #0284c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .slide-in {
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #map { height: 400px; z-index: 1; }
        .nav-active {
            color: #059669;
            position: relative;
        }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #059669;
            border-radius: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

        // Router

            currentPage: 'home',

                        app.innerHTML = this.renderParks();

                        break;
                    case 'routes':

                        break;

                        setTimeout(() => {
                            const map = L.map('map').setView(park.coordinates, 15);
                            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                                attribution: '© OpenStreetMap contributors'
                            }).addTo(map);
                            L.marker(park.coordinates).addTo(map)
                                .bindPopup(`<b>${park.name}</b><br>${park.address}`)
                                .openPopup();
                        }, 100);
                    }
                }
            }
        };

        // Filter Functions
        function filterParks() {
            const search = document.getElementById('park-search').value.toLowerCase();
            const city = document.getElementById('city-filter').value;
            const state = document.getElementById('state-filter').value;
            
            const cards = document.querySelectorAll('#parks-grid > div');
            let visible = 0;
            
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const cardCity = card.getAttribute('data-city');
                const cardState = card.getAttribute('data-state');
                
                const matchesSearch = name.includes(search);
                const matchesCity = !city || cardCity === city;
                const matchesState = !state || cardState === state;
                
                if (matchesSearch && matchesCity && matchesState) {
                    card.style.display = 'block';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            document.getElementById('no-parks').style.display = visible === 0 ? 'block' : 'none';
        }

        function filterRoutes() {
            const search = document.getElementById('route-search').value.toLowerCase();
            const destination = document.getElementById('destination-filter').value;
            
            const items = document.querySelectorAll('#routes-list > div');
            let visible = 0;
            
            items.forEach(item => {
                const from = item.getAttribute('data-from');
                const to = item.getAttribute('data-to');
                const itemDest = item.getAttribute('data-destination');
                
                const matchesSearch = from.includes(search) || to.includes(search);
                const matchesDest = !destination || itemDest === destination;
                
                if (matchesSearch && matchesDest) {
                    item.style.display = 'block';
                    visible++;
                } else {
                    item.style.display = 'none';
                }
            });
            
            document.getElementById('no-routes').style.display = visible === 0 ? 'block' : 'none';
        }

        function handleHeroSearch(e) {
            if (e.key === 'Enter') {
                performHeroSearch();
            }
        }

        function performHeroSearch() {
            const query = document.getElementById('hero-search').value.toLowerCase();
            if (!query) return;
            
            // Check if query matches a park
            const park = data.parks.find(p => 
                p.name.toLowerCase().includes(query) || 
                p.city.toLowerCase().includes(query) ||
                p.state.toLowerCase().includes(query)
            );
            
            if (park) {
                router.navigate('details', { type: 'park', id: park.id });
                return;
            }
            
            // Check if query matches a route
            const route = data.routes.find(r => 
                r.from.toLowerCase().includes(query) || 
                r.to.toLowerCase().includes(query)
            );
            
            if (route) {
                router.navigate('details', { type: 'route', id: route.id });
                return;
            }
            
            // Default to parks page with search
            router.navigate('parks');
            setTimeout(() => {
                document.getElementById('park-search').value = query;
                filterParks();
            }, 100);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function shareRoute(id) {
            const route = data.routes.find(r => r.id === id);
            if (navigator.share) {
                navigator.share({
                    title: `Bus Route: ${route.from} to ${route.to}`,
                    text: `Check out this bus route from ${route.from} to ${route.to}. Fare: ${route.fare}`,
                    url: window.location.href
                });
            } else {
                alert('Route link copied to clipboard!');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            router.navigate('home');
        });

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            // In a real app, handle URL routing here
        });
    </script>
</body>
